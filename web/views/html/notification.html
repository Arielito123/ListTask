<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>¡Tu tarea está por vencer!</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #fff3e0;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .container {
            text-align: center;
            background-color: #ffffff;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0px 4px 10px rgba(0, 0, 0, 0.1);
            width: 90%;
            max-width: 500px;
        }
        .header {
            background-color: #ff6f00;
            color: white;
            padding: 15px;
            border-radius: 8px 8px 0 0;
            font-size: 1.5em;
            font-weight: bold;
        }
        .content {
            padding: 20px;
            color: #333;
        }
        .task-info {
            font-size: 1.2em;
            font-weight: bold;
            color: #d84315;
        }
        .login-link {
            display: inline-block;
            background-color: #ff6f00;
            color: white;
            text-decoration: none;
            padding: 10px 20px;
            border-radius: 5px;
            font-weight: bold;
            margin-top: 15px;
            transition: background 0.3s;
        }
        .login-link:hover {
            background-color: #e65100;
        }
        .warning {
            background-color: #ffe0b2;
            padding: 10px;
            border-radius: 5px;
            margin-top: 20px;
            font-size: 0.9em;
            font-weight: bold;
        }
        .logo {
            width: 120px;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">¡Atención!</div>
        <div class="content">
            <p>Hola <strong>{{name}} {{last_name}}</strong>,</p>
            <p class="task-info">Tu tarea <strong>"{{task_name}}"</strong> está por vencer.</p>
            <p>Fecha límite: <strong>{{reminder_date}}</strong></p>
            <a href="../../index.php" class="login-link">Ver tarea</a>
            <div class="warning">
                ¡No dejes que se pase el tiempo! Completa tu tarea a tiempo.
            </div>
        </div>
    </div>
</body>
</html>
